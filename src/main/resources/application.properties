
# -----------------------------
# JPA
# -----------------------------
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Essential Passkey (WebAuthn) Configuration
spring.security.webauthn.relying-party.id=localhost
spring.security.webauthn.relying-party.name=Spring Boot Passkey Demo
spring.security.webauthn.relying-party.origins=http://localhost:8080

# H2 Console (so you can see your data)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

