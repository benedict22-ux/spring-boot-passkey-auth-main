# 1. Connection settings (Save to file 'passkeydb' in 'data' folder)
spring.datasource.url=jdbc:h2:file:./data/passkeydb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 2. Hibernate logic (Update schema if entities change, but don't drop)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. Initialization logic (Always check the schema script)
spring.sql.init.mode=always

# 4. H2 Console Access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Important: This makes sure the console uses the same file as the app
spring.h2.console.settings.web-allow-others=true 

server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false